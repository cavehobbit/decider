<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PickForMe - Decision Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container">
    
    <header class="header">
      <h1 class="logo">⚡ PICKFORME</h1>
      <p class="tagline">cant decide? i got you</p>
    </header>

    <div class="sound-toggle">
      <button id="soundToggle" class="btn-sound" title="Toggle sound">

        <span id="soundIcon">🔊</span>
      </button>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <input 
          type="text" 
          id="optionInput" 
          placeholder="type an option..." 
          class="option-input"

          maxlength="50"
        >
        <button id="addBtn" class="btn-add">ADD</button>
      </div>
    </div>

    <div id="optionsList" class="options-list">
      
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🤷</div>
        <p>need at least 2 options bruh</p>
      </div>
    </div>

    
    <button id="decideBtn" class="btn-decide" disabled>
      DECIDE NOW
    </button>



    <div id="resultSection" class="result-section hidden">
      <div class="result-content">
        <div class="result-emoji">🎯</div>
        <h2 class="result-label">THE WINNER IS:</h2>

        <div id="finalChoice" class="final-choice">Pizza</div>
        <button id="tryAgainBtn" class="btn-try-again">GO AGAIN</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
